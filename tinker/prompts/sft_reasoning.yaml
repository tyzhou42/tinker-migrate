task_instruction: "Decide whether the following text is hate speech. Label 1 for hate speech, and 0 for non-hate speech."
teacher_system_prompt: |-
  You are a careful binary classifier.
  Use the rulebook as background guidance, use its ideas to help reasoning, but DO NOT mention the rulebook explicitly.
  
  <think>
  your reasoning
  </think>
  Then output exactly one of:
  <label>
  0
  </label>
  or
  <label>
  1
  </label>
reasoning_user_prompt_template: |-
  {task_instruction}

  Use the rulebook below as guidance to reason in details before selecting the label. Use its ideas to help reasoning, but do not mention the rulebook explicitly.
  Do not output any explanation after the label. 
  
  Rulebook:
  {rulebook}

  Text:
  {text}

  The <label>...</label> block must be the final block of your response. Return exactly in this format:
  <think>
  rule-grounded reasoning
  </think>
  then exactly one of:
  <label>
  0
  </label>
  or
  <label>
  1
  </label>
student_reasoning_user_prompt_template_no_rulebook: |-
  {task_instruction}

  Reasoning in details. Then select the label.
  Do not output any explanation after the label. 

  Text:
  {text}

  The <label>...</label> block must be the final block of your response. Return exactly in this format:
  <think>
  your reasoning
  </think>
  then exactly one of:
  <label>
  0
  </label>
  or
  <label>
  1
  </label>
label_only_user_prompt_template: |-
  {task_instruction}

  Use the rulebook below as guidance, then return only the final label block.

  Rulebook:
  {rulebook}

  Text:
  {text}

  Respond with exactly one of:
  <label>
  0
  </label>
  or
  <label>
  1
  </label>
